services:
  - type: web
    name: wa-manager
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: PORT
        value: 10000
      - key: PUPPETEER_SKIP_CHROMIUM_DOWNLOAD
        value: "true"
      - key: PUPPETEER_SKIP_DOWNLOAD
        value: "true"
      - key: CHROME_PATH
        value: /usr/bin/google-chrome
    disk:
      name: sessions
      mountPath: /opt/render/project/src/sessions
      sizeGB: 1
